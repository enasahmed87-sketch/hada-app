<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هَدَأ — لوحة الإدارة</title>
<style>
:root{
  --cream:#FBF4EE;--plum:#3D2B3D;--rose:#C97B84;--terracotta:#B5573F;
  --sage:#8A9B7E;--line:#E3D4CB;--gold:#C8956D;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--cream);color:var(--plum);font-family:'Tajawal','Segoe UI',sans-serif;font-size:14px;line-height:1.6;}
h1,h2{font-family:Georgia,serif;font-weight:400;margin:0;}

/* login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:40px;max-width:360px;width:100%;text-align:center;}
.login-box h1{font-size:28px;color:var(--plum);margin-bottom:6px;}
.login-box p{color:#9b8a92;font-size:13px;margin-bottom:24px;}
.login-box input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--plum);background:#FFFDFB;margin-bottom:14px;}
.btn{background:var(--plum);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;}
.btn:hover{background:#2a1e2a;}
.error{color:var(--terracotta);font-size:12.5px;margin-top:6px;display:none;}

/* dashboard */
.dash{display:none;max-width:900px;margin:0 auto;padding:32px 20px 60px;}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid var(--line);}
.brand{display:flex;align-items:center;gap:12px;}
.dot{width:14px;height:14px;border-radius:50%;background:var(--terracotta);}
.brand h1{font-size:22px;}
.brand .tag{font-size:12px;color:var(--rose);}
.logout-btn{background:transparent;border:1.5px solid var(--line);border-radius:10px;padding:7px 14px;font-size:12px;cursor:pointer;color:#9b8a92;font-family:inherit;}
.logout-btn:hover{border-color:var(--rose);color:var(--rose);}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:20px;text-align:center;}
.stat-card .num{font-size:36px;font-family:Georgia,serif;color:var(--terracotta);}
.stat-card .lbl{font-size:12px;color:#6b5a64;margin-top:4px;}
.stat-card.highlight{background:linear-gradient(135deg,#3D2B3D,#5A3F52);color:#fff;border-color:transparent;}
.stat-card.highlight .num{color:#FBD89B;}
.stat-card.highlight .lbl{color:rgba(255,255,255,.75);}

/* cards */
.card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:22px;margin-bottom:18px;}
.card h2{font-size:16px;margin-bottom:16px;color:var(--plum);}
.eyebrow{font-size:10px;color:var(--rose);font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;}

/* table */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:right;color:#9b8a92;font-weight:600;padding:6px 10px;border-bottom:1.5px solid var(--line);}
td{padding:10px 10px;border-bottom:1px solid #F3EAE3;color:var(--plum);}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;background:#F0F8F0;color:var(--sage);border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700;}

/* activity bars */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-date{font-size:11px;color:#9b8a92;width:80px;flex-shrink:0;}
.bar-bg{flex:1;background:#F3EAE3;border-radius:999px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(135deg,var(--terracotta),var(--rose));transition:.3s;}
.bar-num{font-size:11px;color:var(--terracotta);font-weight:700;width:24px;text-align:left;flex-shrink:0;}

.loading{text-align:center;padding:40px;color:#9b8a92;font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:10px;">🌙</div>
    <h1>هَدَأ</h1>
    <p>لوحة الإدارة — للمشغّل فقط</p>
    <input type="password" id="adminPwd" placeholder="كلمة مرور الإدارة" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">دخول</button>
    <div class="error" id="loginErr">كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dashboard">
  <div class="dash-header">
    <div class="brand">
      <div class="dot"></div>
      <div><h1>هَدَأ</h1><div class="tag">لوحة الإدارة</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="lastUpdated" style="font-size:11px;color:#9b8a92;"></span>
      <button class="logout-btn" onclick="refresh()">🔄 تحديث</button>
      <button class="logout-btn" onclick="logout()">خروج</button>
    </div>
  </div>

  <div id="dashContent" class="loading">جارٍ تحميل البيانات...</div>
</div>

<script>
const API = 'https://hada-api.enasahmed87.workers.dev';
let adminSecret = '';

async function login() {
  const pwd = document.getElementById('adminPwd').value.trim();
  if (!pwd) return;
  adminSecret = pwd;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const data = await fetchStats();
    if (data.error) { err.style.display = 'block'; adminSecret = ''; return; }
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDash(data);
  } catch(e) {
    err.style.display = 'block';
    adminSecret = '';
  }
}

async function fetchStats() {
  const res = await fetch(API + '/api/admin/stats', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ secret: adminSecret })
  });
  return res.json();
}

async function refresh() {
  document.getElementById('dashContent').innerHTML = '<div class="loading">جارٍ تحديث...</div>';
  const data = await fetchStats();
  renderDash(data);
}

function logout() {
  adminSecret = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminPwd').value = '';
}

function renderDash(d) {
  const now = new Date().toLocaleTimeString('ar-SA');
  document.getElementById('lastUpdated').textContent = 'آخر تحديث: ' + now;

  const maxEntries = Math.max(...d.dailyActivity.map(x => x.entries), 1);

  document.getElementById('dashContent').innerHTML = `
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="num">${d.totalUsers}</div>
        <div class="lbl">إجمالي المسجّلات</div>
      </div>
      <div class="stat-card">
        <div class="num">${d.activeToday}</div>
        <div class="lbl">نشطات اليوم</div>
      </div>
      <div class="stat-card">
        <div class="num">${d.activeThisWeek}</div>
        <div class="lbl">نشطات هذا الأسبوع</div>
      </div>
      <div class="stat-card">
        <div class="num">${d.activeThisMonth}</div>
        <div class="lbl">نشطات هذا الشهر</div>
      </div>
      <div class="stat-card">
        <div class="num">${d.totalEntries}</div>
        <div class="lbl">إجمالي التسجيلات</div>
      </div>
    </div>

    <!-- Activity chart -->
    <div class="card">
      <div class="eyebrow">النشاط اليومي</div>
      <h2>تسجيلات آخر 14 يومًا</h2>
      ${d.dailyActivity.length === 0
        ? '<p style="color:#9b8a92;font-size:13px;">لا توجد بيانات بعد.</p>'
        : d.dailyActivity.map(row => `
          <div class="bar-row">
            <div class="bar-date">${row.date}</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(row.entries/maxEntries*100)}%"></div></div>
            <div class="bar-num">${row.entries}</div>
          </div>
        `).join('')}
    </div>

    <!-- Recent users -->
    <div class="card">
      <div class="eyebrow">آخر التسجيلات</div>
      <h2>أحدث 10 حسابات مسجّلة</h2>
      ${d.recentUsers.length === 0
        ? '<p style="color:#9b8a92;font-size:13px;">لا توجد حسابات بعد.</p>'
        : `<table>
          <thead>
            <tr><th>الاسم</th><th>البريد الإلكتروني</th><th>تاريخ التسجيل</th></tr>
          </thead>
          <tbody>
            ${d.recentUsers.map(u => `
              <tr>
                <td>${u.name || '—'}</td>
                <td style="direction:ltr;text-align:right;">${maskEmail(u.email)}</td>
                <td>${u.created_at ? u.created_at.slice(0,10) : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
    </div>
  `;
}

function maskEmail(email) {
  if (!email) return '—';
  const [user, domain] = email.split('@');
  const masked = user.slice(0,2) + '***';
  return masked + '@' + domain;
}
</script>
</body>
</html>
